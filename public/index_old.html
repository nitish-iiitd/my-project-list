<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitish | Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen selection:bg-blue-200 antialiased overflow-y-scroll">
    
    <!-- App Header -->
    <header class="border-b border-gray-200 bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <a href="#" class="text-xl font-bold tracking-tight text-gray-900 hover:text-blue-600 transition-colors">
                Portfolio
            </a>
            <nav>
                <a href="https://github.com/nitish-iiitd" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">
                    GitHub
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content Container -->
    <main id="app-root" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- JS will render content here -->
        <div class="flex justify-center items-center h-64">
            <div class="animate-pulse text-gray-400">Loading projects...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 py-8 mt-12 text-center text-sm text-gray-500 bg-white">
        <p>&copy; 2026 Nitish Srivastava</p>
    </footer>

    <!-- App Logic -->
    <script src="data/projects.js"></script>
    <script src="app.js"></script>
</body>
</html>
